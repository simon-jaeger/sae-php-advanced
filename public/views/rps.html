<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>rsp</title>
  <style>
    body {
      font-family: system-ui;
    }

    button {
      font-size: 32px;
    }

    button:focus {
      background: #999;
    }
  </style>
  <script>
    async function play(attack) {
      const response = await fetch('http://localhost:8000/api/examples/rps', {
        method: 'POST',
        body: JSON.stringify({attack}),
      })
      const data = await response.json()
      console.log(data)
      document.getElementById('output').textContent = `
        you attacked with: ${data.attack}
        the server defended with: ${data.defense}
        result: ${data.result}
      `
    }
  </script>
</head>

<body>
  <h1>rock, paper, scissors</h1>
  <div style="display: flex">
    <button onclick="play('rock')">✊</button>
    <button onclick="play('paper')">✋</button>
    <button onclick="play('scissors')">✌️</button>
  </div>
  <div id="output" style="white-space: pre-line"></div>
</body>
</html>
